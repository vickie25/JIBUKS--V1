openapi: 3.0.3
info:
  title: JIBUKS Super Admin Dashboard API
  version: "1.0.0"
  description: |
    Base URL includes `/api`. Example server: `https://api.example.com/api`.
    All `/admin/dashboard/*` routes require `Authorization: Bearer <admin_jwt>` (JWT with `isAdmin: true`).

    Metric definitions: see `src/controllers/adminDashboardController.js` and `src/services/adminDashboardService.js`.

servers:
  - url: https://api.example.com/api
    description: Production (replace host)
  - url: http://localhost:4001/api
    description: Local

security:
  - bearerAuth: []

paths:
  /users/me/presence:
    patch:
      summary: Heartbeat — updates User.lastSeenAt (tenant JWT, not admin)
      description: Call from mobile/web on an interval so Super Admin "Active now" is meaningful.
      security: [{ userBearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  lastSeenAt: { type: string, format: date-time }
        "401":
          description: Missing or invalid user JWT

  /admin/dashboard/summary:
    get:
      summary: Overview KPI cards (revenue, subscriptions, users, active now)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/dashboard/active-sessions:
    get:
      summary: Lightweight active user count (same 5-minute window as summary.activeNow)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /admin/dashboard/revenue-by-month:
    get:
      summary: 12-month invoice totals for bar chart
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: year
          schema: { type: integer, example: 2026 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  year: { type: integer }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        month: { type: integer }
                        label: { type: string }
                        total: { type: number }

  /admin/dashboard/recent-users:
    get:
      summary: Recent tenant users + newUsersThisMonth
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10, maximum: 50 }
        - in: query
          name: cursor
          schema: { type: integer }
          description: Last user `id` from previous page (keyset, order by id desc)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      newUsersThisMonth: { type: integer }
                      nextCursor: { type: integer, nullable: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RecentUser"

  /admin/dashboard/analytics/traffic:
    get:
      summary: Daily traffic for area chart
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema: { type: string, enum: ["7d", "30d"], default: "7d" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string, format: date }
                        label: { type: string }
                        clicks: { type: integer }
                        uniques: { type: integer }

  /admin/dashboard/analytics/kpis:
    get:
      summary: Analytics tab KPI cards
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema: { type: string, enum: ["7d", "30d"], default: "7d" }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsKpis"

  /admin/dashboard/analytics/referrers:
    get:
      summary: Referrer buckets (summed counts in range)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema: { type: string, enum: ["7d", "30d"], default: "30d" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        value: { type: integer }

  /admin/dashboard/analytics/devices:
    get:
      summary: Device mix (percentages, seeded snapshot)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema: { type: string, enum: ["7d", "30d"], default: "30d" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        percent: { type: number }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    userBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Standard user JWT (tenant member)

  schemas:
    KpiBlock:
      type: object
      properties:
        value: { type: number }
        changePercent: { type: number, nullable: true }
        periodLabel: { type: string }
    DashboardSummary:
      type: object
      properties:
        totalRevenue:
          type: object
          properties:
            value: { type: number }
            currency: { type: string }
            changePercent: { type: number, nullable: true }
            periodLabel: { type: string }
        subscriptions:
          allOf:
            - $ref: "#/components/schemas/KpiBlock"
            - type: object
              properties:
                value: { type: integer }
        users:
          allOf:
            - $ref: "#/components/schemas/KpiBlock"
            - type: object
              properties:
                value: { type: integer }
        activeNow:
          type: object
          properties:
            value: { type: integer }
            deltaSinceLastHour: { type: integer }
            periodLabel: { type: string }
    RecentUser:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, nullable: true }
        email: { type: string }
        avatarUrl: { type: string, nullable: true }
        status: { type: string, enum: [active, new, inactive] }
        lastSeenAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    AnalyticsKpis:
      type: object
      properties:
        totalClicks:
          $ref: "#/components/schemas/KpiBlock"
        uniqueVisitors:
          type: object
          properties:
            value: { type: integer }
            changePercent: { type: number, nullable: true }
            periodLabel: { type: string }
        bounceRate:
          type: object
          properties:
            value: { type: number }
            unit: { type: string, example: percent }
            changePercent: { type: number, nullable: true }
            periodLabel: { type: string }
        avgSessionSeconds:
          type: object
          properties:
            value: { type: integer }
            changePercent: { type: number, nullable: true }
            periodLabel: { type: string }
